name: Continuous Integration

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Formatting
        run: npx prettier --check .

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npx eslint --ignore-pattern dist/ --ignore-pattern .serverless/ .

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Type Check
        run: npm run tsc

  tests:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm run test

  serverless-floci-smoke:
    name: Serverless Floci Smoke (${{ matrix.notification-provider }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        notification-provider:
          - console
          - sns

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-2
      AWS_REGION: us-east-2
      AWS_ENDPOINT_URL: http://localhost:4566
      M365_AWS_ENDPOINT_URL: http://localhost.floci.io:4566
      AES_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      NOTIFICATION_PROVIDER: ${{ matrix.notification-provider }}
      NOTIFICATION_EMAIL: ci@example.com
      TOTP_SERVER_BASE_URL: https://example.com
      SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Start Floci
        run: |
          docker run -d --name floci \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e FLOCI_DEFAULT_REGION=us-east-2 \
            -e FLOCI_STORAGE_MODE=memory \
            -u root \
            floci/floci:latest

          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:4566/_localstack/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs floci
          exit 1

      - name: Deploy Serverless Stack To Floci
        run: npx serverless deploy --stage local

      - name: Verify Deployed Resources
        run: |
          aws --endpoint-url http://localhost:4566 lambda list-functions
          aws --endpoint-url http://localhost:4566 dynamodb describe-table --table-name M365-Renew-V2-Users
          aws --endpoint-url http://localhost:4566 dynamodb describe-table --table-name M365-Renew-V2-Processing-Log

          topics="$(aws --endpoint-url http://localhost:4566 sns list-topics --query 'Topics[].TopicArn' --output text)"
          if [ "${NOTIFICATION_PROVIDER}" = "sns" ]; then
            if [[ "${topics}" != *"M365-Renew-V2-Notifications"* ]]; then
              printf 'Expected SNS notification topic for provider sns, found: %s\n' "${topics}"
              exit 1
            fi
          elif [[ "${topics}" == *"M365-Renew-V2-Notifications"* ]]; then
            printf 'Did not expect SNS notification topic for provider %s, found: %s\n' "${NOTIFICATION_PROVIDER}" "${topics}"
            exit 1
          fi

      - name: Show Floci Logs On Failure
        if: failure()
        run: docker logs floci

  dependabot-auto-merge:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.state == 'open' && !github.event.repository.fork }}
    name: Auto-Merge Dependabot PR
    needs:
      - format
      - lint
      - typecheck
      - tests
      - serverless-floci-smoke
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Enable Auto-Merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
